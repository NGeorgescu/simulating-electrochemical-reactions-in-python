name: notebooks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  execute:
    name: Execute all notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute every notebook (fails on any error or failed assert)
        run: |
          for nb in notebooks/*.ipynb notebooks/extras/*.ipynb; do
            echo "::group::$nb"
            jupyter nbconvert --to notebook --execute --stdout \
              --ExecutePreprocessor.timeout=1200 "$nb" > /dev/null
            echo "::endgroup::"
          done
